<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hungry Animal - 第20弾</title>
    <style>
        body { margin: 0; overflow: hidden; background: #e8f5e9; font-family: sans-serif; touch-action: none; }
        
        /* 広告エリア：高さを150pxに設定（中サイズバナー対応） */
        #ad-top, #ad-bottom { 
            position: fixed; left: 0; width: 100%; height: 150px; 
            background: #333; z-index: 100; display: flex; align-items: center; justify-content: center; 
        }
        #ad-top { top: 0; }
        #ad-bottom { bottom: 0; }
        
        iframe { border: none; width: 100%; height: 150px; }

        /* キャンバス：上下の広告を避けて中央に配置 */
        canvas { display: block; margin-top: 150px; background: #c8e6c9; }
        
        #ui { position: absolute; top: 160px; left: 0; width: 100%; text-align: center; color: #2e7d32; font-size: 26px; font-weight: bold; pointer-events: none; text-shadow: 1px 1px 2px white; z-index: 10; }
        
        #startScreen { 
            position: absolute; top: 150px; left: 0; width: 100%; height: calc(100vh - 300px); 
            background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50;
        }
        #goButton { padding: 15px 45px; font-size: 24px; background: #4caf50; border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px #2e7d32; }
        #best-info { margin-top: 15px; font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>

    <div id="ad-top"><iframe id="frame-top" src="ad.html"></iframe></div>
    <div id="ad-bottom"><iframe id="frame-bottom" src="ad.html"></iframe></div>

    <div id="startScreen">
        <h1 style="color:#2e7d32; margin-bottom:10px;">Hungry Animal</h1>
        <p style="margin-bottom: 25px; text-align: center;">落ちてくる「ごはん」をキャッチ！<br>「石」を食べるとお腹を壊しちゃうよ！</p>
        <button id="goButton">あそぶ！</button>
        <p id="best-info">BEST SCORE: <span id="best-ui">0</span></p>
    </div>

    <div id="ui">SCORE: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const ui = document.getElementById("ui");
        const startScreen = document.getElementById("startScreen");
        const goButton = document.getElementById("goButton");
        const bestUi = document.getElementById("best-ui");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 300;

        let score = 0;
        let bestScore = localStorage.getItem("hungry_animal_best") || 0;
        let gameActive = false;
        let player = { x: canvas.width / 2, y: canvas.height - 70, radius: 45, pull: 85 };
        let items = [];
        const foodEmojis = ["🍎", "🍌", "🍖", "🥦", "🍙"];
        const animals = ["🐶", "🐱", "🐻", "🐼", "🐨"];
        let currentAnimal = "🐶";

        bestUi.innerText = bestScore;

        goButton.onclick = () => {
            startScreen.style.display = "none";
            gameActive = true;
            score = 0;
            items = [];
            currentAnimal = animals[Math.floor(Math.random() * animals.length)];
            ui.innerText = "SCORE: 0";
            spawnItem();
            update();
        };

        function handleMove(e) {
            if(!gameActive) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            player.x = clientX;
            if(player.x < player.radius) player.x = player.radius;
            if(player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;
        }

        window.addEventListener("touchmove", (e) => { handleMove(e); e.preventDefault(); }, {passive: false});
        window.addEventListener("mousemove", handleMove);

        function spawnItem() {
            if(!gameActive) return;
            const isStone = Math.random() < 0.25; 
            items.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: -50,
                emoji: isStone ? "🪨" : foodEmojis[Math.floor(Math.random() * foodEmojis.length)],
                type: isStone ? "stone" : "food",
                speed: 3 + Math.random() * 2 + (score / 10)
            });
            let interval = Math.max(200, 800 - (score * 5));
            setTimeout(spawnItem, interval);
        }

        function update() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // プレイヤー（動物の大きな顔）
            ctx.font = "80px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(currentAnimal, player.x, player.y);

            // 吸い込みエフェクト（うっすら円を表示）
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.pull, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.lineWidth = 2;
            ctx.stroke();

            for(let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.y += it.speed;

                // アイテム描画
                ctx.font = "40px Arial";
                ctx.fillText(it.emoji, it.x, it.y);

                // 当たり（吸い込み）判定
                let dx = player.x - it.x;
                let dy = player.y - it.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if(dist < player.pull) {
                    if(it.type === "food") {
                        score++;
                        ui.innerText = "SCORE: " + score;
                        items.splice(i, 1);
                        // キャッチした瞬間のプチ演出
                        player.pull = 100; 
                        setTimeout(()=> player.pull = 85, 50);
                    } else {
                        gameOver();
                        return;
                    }
                } else if(it.y > canvas.height + 50) {
                    items.splice(i, 1);
                }
            }
            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem("hungry_animal_best", bestScore);
            }
            alert("お腹を壊しちゃった！\n食べたごはん: " + score);
            location.reload();
        }

        // 🚀 30秒ごとに広告を転生
        setInterval(() => {
            ["frame-top", "frame-bottom"].forEach(id => {
                const f = document.getElementById(id);
                if(f) {
                    const s = f.src; f.src = "about:blank";
                    setTimeout(() => f.src = s, 100);
                }
            });
        },29000);
    </script>
</body>
</html>
