<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hungry Animal - ぱくぱくアニマル</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; touch-action: none; }
        body { background: #e8f5e9; font-family: 'Hiragino Sans', 'Meiryo', sans-serif; display: flex; flex-direction: column; color: #333; }
        
        /* 上部広告：100px 固定 */
        #ad-top { width: 100%; height: 100px; background: #333; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 100; border-bottom: 2px solid #4caf50; }

        /* ゲームエリア */
        #game-outer { flex-grow: 1; position: relative; width: 100%; background: #c8e6c9; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #ui { position: absolute; top: 15px; width: 100%; text-align: center; color: #2e7d32; font-size: 28px; font-weight: bold; pointer-events: none; z-index: 10; text-shadow: 2px 2px 0 rgba(255,255,255,0.8); }

        /* メニュー画面 */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.96); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 500; padding: 20px;
        }

        /* 収益の柱：レクタングル広告 */
        #ad-middle-box {
            width: 300px; height: 250px; background: #eee;
            margin: 15px 0; display: none; justify-content: center; align-items: center;
            border: 1px solid #ccc; border-radius: 10px; overflow: hidden;
        }
        
        .btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 12px; }
        .menu-btn { width: 280px; padding: 18px; font-size: 20px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        #goButton { background: #4caf50; color: white; box-shadow: 0 5px #2e7d32; }
        #goButton:disabled { background: #bbb; box-shadow: none; color: #777; }
        .sub-btn { background: #9b59b6; color: white; box-shadow: 0 5px #8e44ad; font-size: 16px; }

        /* インタースティシャル（フルスクリーン広告風） */
        #inter-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 99999; align-items: center; justify-content: center; }
        .inter-content { width: 330px; height: 350px; background: #fff; position: relative; border-radius: 15px; }
        #close-ad-btn { position: absolute; top: -55px; right: 0; width: 45px; height: 45px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ad-top">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-outer">
        <div id="ui">SCORE: 0</div>
        
        <div id="menuScreen">
            <div style="text-align:center;">
                <h1 id="menuTitle" style="color:#2e7d32; margin:0; font-size: 32px;">Hungry Animal</h1>
                <p id="menuMsg" style="margin:5px 0; color: #666;">石を避けて「ごはん」を食べよう！</p>
                <div style="color: #2e7d32; font-size: 20px; font-weight: bold; margin: 5px 0;">BEST: <span id="best-ui">0</span></div>
            </div>

            <div id="ad-middle-box">
                <ins class="adsbygoogle" style="display:inline-block;width:300px;height:250px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="9050127185"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <div class="btn-group">
                <button id="goButton" class="menu-btn" onclick="startGame()">あそぶ！</button>
                <a href="https://saaaachi.github.io/" class="sub-btn menu-btn">他のゲームで遊ぶ</a>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div id="inter-screen">
            <div class="inter-content">
                <div id="close-ad-btn" onclick="closeInterAd()">5</div>
                <iframe id="ifr-inter" src="about:blank" style="width:100%; height:100%; border:none; border-radius:15px; background:#fff;"></iframe>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d"),
              ui = document.getElementById("ui"), menuScreen = document.getElementById("menuScreen"),
              menuTitle = document.getElementById("menuTitle"), menuMsg = document.getElementById("menuMsg"),
              bestUi = document.getElementById("best-ui"), goButton = document.getElementById("goButton"),
              adMid = document.getElementById("ad-middle-box"), gameOuter = document.getElementById("game-outer");

        let score = 0, bestScore = localStorage.getItem("hungry_animal_best") || 0, playCount = 0;
        let gameActive = false, player, items = [], spawnTimer;
        const foodEmojis = ["🍎", "🍌", "🍖", "🥦", "🍙"], animals = ["🐶", "🐱", "🐻", "🐼", "🐨"];
        let currentAnimal = "🐶";

        function resize() {
            canvas.width = gameOuter.clientWidth;
            canvas.height = gameOuter.clientHeight;
            player = { x: canvas.width / 2, y: canvas.height - 70, radius: 40, pull: 80 };
        }
        window.onload = () => { resize(); bestUi.innerText = bestScore; adMid.style.display = "none"; };
        window.onresize = resize;

        function startGame() {
            menuScreen.style.display = "none";
            adMid.style.display = "none";
            gameActive = true;
            score = 0;
            items = [];
            currentAnimal = animals[Math.floor(Math.random() * animals.length)];
            ui.innerText = "SCORE: 0";
            resize();
            spawnItem();
            update();
        }

        function handleMove(e) {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            player.x = clientX - rect.left;
            if(player.x < player.radius) player.x = player.radius;
            if(player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;
        }
        window.addEventListener("touchmove", (e) => { handleMove(e); e.preventDefault(); }, {passive: false});
        window.addEventListener("mousemove", handleMove);

        function spawnItem() {
            if(!gameActive) return;
            const isStone = Math.random() < 0.28; 
            items.push({
                x: Math.random() * (canvas.width - 60) + 30,
                y: -50,
                emoji: isStone ? "🪨" : foodEmojis[Math.floor(Math.random() * foodEmojis.length)],
                type: isStone ? "stone" : "food",
                speed: 3.5 + Math.random() * 2 + (score / 20)
            });
            spawnTimer = setTimeout(spawnItem, Math.max(250, 850 - (score * 6)));
        }

        function update() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // アニマル描画
            ctx.font = "75px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(currentAnimal, player.x, player.y);

            // 判定用サークル（薄いガイド）
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.pull, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.stroke();

            for(let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.y += it.speed;
                ctx.font = "42px Arial";
                ctx.fillText(it.emoji, it.x, it.y);

                let dx = player.x - it.x;
                let dy = player.y - it.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if(dist < player.pull) {
                    if(it.type === "food") {
                        score++;
                        ui.innerText = "SCORE: " + score;
                        items.splice(i, 1);
                        // キャッチエフェクト代わりに少し判定を広げる演出
                        player.pull = 95; setTimeout(()=> player.pull = 80, 60);
                    } else {
                        gameOver();
                        return;
                    }
                } else if(it.y > canvas.height + 60) {
                    items.splice(i, 1);
                }
            }
            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            clearTimeout(spawnTimer);
            playCount++;

            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem("hungry_animal_best", bestScore);
                bestUi.innerText = bestScore;
            }

            menuTitle.innerText = "お腹こわした...！";
            menuTitle.style.color = "#d32f2f";
            menuMsg.innerText = "今回のスコア: " + score;
            goButton.innerText = "お待ちください...";
            goButton.disabled = true;

            adMid.style.display = "flex"; 
            menuScreen.style.display = "flex";

            setTimeout(() => {
                goButton.disabled = false;
                goButton.innerText = "もういっかい！";
            }, 1500);

            if(playCount % 3 === 0) setTimeout(showInterAd, 600);
        }

        function showInterAd() {
            const screen = document.getElementById("inter-screen"), 
                  closeBtn = document.getElementById("close-ad-btn"), 
                  ifr = document.getElementById('ifr-inter');
            ifr.src = './ad.large.html?v=' + Date.now();
            screen.style.display = "flex";
            let count = 5;
            closeBtn.innerText = count;
            closeBtn.style.pointerEvents = "none";
            const itv = setInterval(() => {
                count--;
                if(count > 0) closeBtn.innerText = count;
                else {
                    clearInterval(itv);
                    closeBtn.innerText = "×";
                    closeBtn.style.pointerEvents = "auto";
                }
            }, 1000);
        }

        function closeInterAd() {
            document.getElementById("inter-screen").style.display = "none";
            document.getElementById('ifr-inter').src = 'about:blank';
        }
    </script>
</body>
</html>
